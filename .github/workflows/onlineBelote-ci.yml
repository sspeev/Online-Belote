name: CI - Online Belote

on:
  push:
    branches: [ main ]
  pull_request:
    branches:  [ main ]

env:
  NODE_VERSION: '22'

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # Job 2: Check bundle size
  analyze-bundle:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name:  Build and analyze
        run: |
          npm run build
          echo "📦 Build completed!  Checking bundle size..."
          du -sh dist/
          echo "📊 Detailed breakdown:"
          du -h dist/* | sort -h



  # Job 3: Build Production Docker Image
  docker-build-production:
    runs-on:  ubuntu-latest
    needs: build-and-test

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: |
          docker build -f Dockerfile -t online-belote:prod .

      - name: Verify Docker image
        run: docker images | grep online-belote

      - name: Test container startup
        run: |
          docker run -d --name test-frontend -p 3000:3000 online-belote:prod
          sleep 10
          docker ps | grep test-frontend
          docker logs test-frontend

      - name: Test frontend response
        run: |
          curl -f http://localhost:3000 || exit 1
          echo "✅ Frontend is responding!"

      - name: Cleanup container
        if: always()
        run: |
          docker stop test-frontend || true
          docker rm test-frontend || true




  # Job 4: Build and Test Development Docker Setup
  docker-build-development:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses:  actions/checkout@v4

      - name: Build development Docker image
        run: |
          docker build -f DockerfileDev -t online-belote:dev .

      - name: Verify Docker image
        run: docker images | grep online-belote

      - name: Test with Docker Compose (Development)
        run: |
          docker run -d --name test-frontend-dev -p 5173:5173 online-belote:dev
          sleep 15
          docker ps | grep test-frontend-dev
          docker logs test-frontend-dev

      - name: Test dev server response
        run: |
          curl -f http://localhost:5173 || exit 1
          echo "✅ Dev server is responding!"

      - name: Cleanup
        if: always()
        run: |
          docker stop test-frontend-dev || true
          docker rm test-frontend-dev || true
          docker system prune -f
