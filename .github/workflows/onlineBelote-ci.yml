# Frontend CI Pipeline
name: CI - Online Belote

# When to run
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Environment variables (used across all jobs)
env:
  NODE_VERSION: '20'  # Node.js version (can also use 18 or 22)

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # ${{ }} is how you reference variables in GitHub Actions
          cache: 'npm'  # Cache npm dependencies for faster builds
          # This remembers your node_modules between runs

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
        # npm ci is like npm install but:
        # - Faster
        # - More reliable in CI environments
        # - Uses exact versions from package-lock.json

      # Step 4: Type checking
      - name: Type check
        run: npm run type-check
        # Checks TypeScript types without building
        # Catches type errors early

      # Step 5: Lint the code
      - name: Run linter
        run: npm run lint
        # Checks code style and common errors
        # Uses your ESLint configuration

      # Step 6: Run tests
      - name: Run tests
        run: npm run test
        # Runs your Vitest tests
        # Note: You may not have tests yet - that's OK!

      # Step 7: Build the production bundle
      - name: Build production bundle
        run: npm run build
        # Creates optimized production files
        # This is what you'd deploy to a server

      # Step 8: Upload build artifacts (optional but useful)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
        # This saves your built files for 7 days
        # Useful for debugging or manual deployment
        # The 'dist/' folder is where Vite puts built files

  # Job 2: Check bundle size (optional - helps prevent bloat)
  analyze-bundle:
    runs-on: ubuntu-latest
    needs: build-and-test  # Only run after build succeeds
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and analyze
        run: |
          npm run build
          echo "📦 Build completed!  Checking bundle size..."
          du -sh dist/
          echo "📊 Detailed breakdown:"
          du -h dist/* | sort -h
        # This shows you how big your built app is
        # Helps catch accidentally large bundles