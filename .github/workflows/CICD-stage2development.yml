name: Online Belote - stage2development

on:
  push:
    branches: [stage-2-development]
  pull_request:
    branches: [stage-2-development]

env:
  NODE_VERSION: '22'

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate route tree
        run: npm run generate-routes

      - name: Type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      #      - name: Run tests
      #        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # Job 2: Check bundle size
  analyze-bundle:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and analyze
        run: |
          npm run build
          echo "📦 Build completed!  Checking bundle size..."
          du -sh dist/
          echo "📊 Detailed breakdown:"
          du -h dist/* | sort -h

