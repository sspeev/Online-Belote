<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Belote Master - Create Lobby</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#B25B32',
              'brand-burnt': '#B25B32',
              'brand-charcoal': '#2D2D2D',
              'brand-offwhite': '#F9F9F7',
              'brand-softgray': '#E5E5E1',
              'background-light': '#F9F9F7',
              'background-dark': '#221610',
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
              full: '9999px',
            },
            boxShadow: {
              card: '0 4px 12px rgba(45, 45, 45, 0.08)',
              button: '0 4px 8px rgba(0,0,0,0.1)',
            },
          },
        },
      }
    </script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }

      .card-sophisticated {
        background: white;
        border: 1px solid #e5e5e1;
        box-shadow: 0 4px 12px rgba(45, 45, 45, 0.08);
      }
    </style>
  </head>
  <body
    class="bg-brand-offwhite text-brand-charcoal dark:bg-background-dark dark:text-slate-100 transition-colors duration-200"
  >
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
      <!-- Header / Top Navigation -->
      <header
        class="flex items-center justify-between border-b border-brand-softgray px-6 md:px-20 py-4 bg-brand-offwhite/80 backdrop-blur-md sticky top-0 z-50"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-7 h-7 bg-brand-burnt rounded flex items-center justify-center text-white font-bold text-sm"
          >
            B
          </div>
          <h2
            class="text-xl font-bold tracking-tight text-brand-charcoal dark:text-white uppercase"
          >
            Belote Master
          </h2>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="p-2 rounded-full hover:bg-brand-softgray transition-colors"
          >
            <span
              class="material-symbols-outlined text-brand-charcoal/60 dark:text-slate-300"
              >settings</span
            >
          </button>
          <div
            class="hidden md:flex items-center gap-3 pl-4 border-l border-brand-softgray"
          >
            <div
              class="size-10 rounded-full bg-brand-softgray flex items-center justify-center overflow-hidden border-2 border-brand-burnt/20"
            >
              <img
                alt="User profile avatar icon"
                class="w-full h-full object-cover"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDk_xpZG8wBT8gNXRI1YbQ-ob23-Jcu-nuHd4aFktMoRC5rFk1Yn_FNyddKtmjaN1uAmESTqGpebhhdhyC1ga4c0rVvXQW7JIIkn3UKwwXarkVZNWA_PHn5WXYwZ5eMzjlxwhCpbU3xMgyFChuE1A2iHTB14JwTAkzmgyrpWmqDWyOTlxY1qLMiy-idI_oPuZPtaDP6Ccf3DXJs4VI56ayU2_lvK5Jdi4UYrQ4EK3afmOBrWzPn5HPfbfCE_n1w8xA2qVv6lWacAo3Z"
              />
            </div>
            <div class="flex flex-col">
              <span
                class="text-[10px] font-bold text-brand-burnt uppercase tracking-widest"
                >Gold Rank</span
              >
              <span class="text-sm font-semibold">Alex G.</span>
            </div>
          </div>
        </div>
      </header>
      <main
        class="flex-1 flex flex-col items-center justify-center px-6 py-12 md:py-24"
      >
        <div
          class="w-full max-w-xl card-sophisticated rounded-3xl p-8 md:p-12 dark:bg-brand-charcoal/30 dark:border-slate-800"
        >
          <!-- Screen Heading -->
          <div class="mb-10">
            <nav
              class="flex items-center gap-2 text-gray-400 mb-4 text-xs font-bold uppercase tracking-widest"
            >
              <a class="hover:text-brand-burnt transition-colors" href="#"
                >Lobbies</a
              >
              <span class="material-symbols-outlined text-xs"
                >chevron_right</span
              >
              <span class="text-brand-charcoal dark:text-slate-100"
                >Create New</span
              >
            </nav>
            <h1
              class="text-4xl md:text-5xl font-bold text-brand-charcoal dark:text-white tracking-tight mb-2"
            >
              New Lobby
            </h1>
            <p class="text-gray-500 dark:text-slate-400 text-lg">
              Set up your private game table and invite friends.
            </p>
          </div>
          <!-- Form Section -->
          <form class="space-y-8">
            <div class="space-y-6">
              <!-- Player Name Input -->
              <div class="group">
                <label
                  class="block text-[10px] font-bold text-gray-400 dark:text-slate-400 uppercase tracking-[0.2em] mb-2 px-1"
                  for="player-name"
                >
                  Player Name
                </label>
                <div class="relative">
                  <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-burnt transition-colors text-xl"
                    >person</span
                  >
                  <input
                    class="w-full pl-12 pr-4 py-4 bg-brand-offwhite border border-brand-softgray rounded-2xl focus:border-brand-burnt focus:ring-0 transition-all placeholder:text-gray-300 dark:bg-slate-900/50 dark:border-slate-800 dark:placeholder:text-slate-600 text-brand-charcoal dark:text-white font-medium"
                    id="player-name"
                    placeholder="e.g. CardShark99"
                    type="text"
                  />
                </div>
              </div>
              <!-- Lobby Name Input -->
              <div class="group">
                <label
                  class="block text-[10px] font-bold text-gray-400 dark:text-slate-400 uppercase tracking-[0.2em] mb-2 px-1"
                  for="lobby-name"
                >
                  Lobby Name
                </label>
                <div class="relative">
                  <span
                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-burnt transition-colors text-xl"
                    >style</span
                  >
                  <input
                    class="w-full pl-12 pr-4 py-4 bg-brand-offwhite border border-brand-softgray rounded-2xl focus:border-brand-burnt focus:ring-0 transition-all placeholder:text-gray-300 dark:bg-slate-900/50 dark:border-slate-800 dark:placeholder:text-slate-600 text-brand-charcoal dark:text-white font-medium"
                    id="lobby-name"
                    placeholder="e.g. Sunday Classics"
                    type="text"
                  />
                </div>
              </div>
            </div>
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 pt-4">
              <button
                class="flex-1 bg-brand-burnt hover:bg-brand-burnt/90 text-white font-bold py-5 px-8 rounded-2xl shadow-lg shadow-brand-burnt/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2"
                type="submit"
              >
                <span>Create Game</span>
                <span class="material-symbols-outlined text-xl"
                  >arrow_forward</span
                >
              </button>
              <button
                class="flex-1 bg-white border border-brand-softgray hover:border-brand-charcoal text-brand-charcoal font-bold py-5 px-8 rounded-2xl transition-all flex items-center justify-center gap-2 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300"
                type="button"
              >
                <span>Cancel</span>
              </button>
            </div>
          </form>
          <!-- Additional Info -->
          <div
            class="mt-12 p-6 rounded-2xl bg-brand-burnt/5 border border-brand-burnt/10 flex items-start gap-4"
          >
            <span class="material-symbols-outlined text-brand-burnt">info</span>
            <p
              class="text-sm text-gray-500 dark:text-slate-400 leading-relaxed"
            >
              Lobbies are private by default. Once created, you'll receive a
              unique 6-digit code to share with your teammates and opponents.
            </p>
          </div>
        </div>
      </main>

      <!-- Decorative Background Elements -->
      <div
        class="fixed -bottom-24 -left-24 w-96 h-96 bg-brand-gold/5 rounded-full blur-3xl pointer-events-none -z-10"
      ></div>
      <div
        class="fixed -top-24 -right-24 w-96 h-96 bg-brand-burnt/5 rounded-full blur-3xl pointer-events-none -z-10"
      ></div>
    </div>
  </body>
</html>
